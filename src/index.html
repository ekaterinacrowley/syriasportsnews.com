<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title data-i18n="site.title">Syriasportsnews</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Syriasportsnews: live football matches, sports news, team updates, highlights and analytics from Oman and worldwide.">
<meta name="keywords" data-i18n-content="site.keywords" content="sports news, football news, live matches, match center, sports highlights, Oman sports, cricket news, basketball news, volleyball news, tennis news, esports news, MMA news">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="author" content="Syriasportsnews">
<link rel="canonical" href="https://syriasportsnews.com/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Syriasportsnews">
<meta property="og:title" content="Syriasportsnews - Live Matches, News and Highlights">
<meta property="og:description" content="Follow live football, breaking sports news, match updates and team highlights on Syriasportsnews.">
<meta property="og:url" content="https://syriasportsnews.com/">
<meta property="og:image" content="https://syriasportsnews.com/images/favicon-light.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Syriasportsnews - Live Matches, News and Highlights">
<meta name="twitter:description" content="Follow live football, breaking sports news, match updates and team highlights on Syriasportsnews.">
<meta name="twitter:image" content="https://syriasportsnews.com/images/favicon-light.png">
<link rel="icon" href="images/favicon-light.png" id="favicon">
<link rel="stylesheet" href="styles.css"> 
<link rel="stylesheet" href="adaptive.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "NewsMediaOrganization",
      "@id": "https://syriasportsnews.com/#organization",
      "name": "Oman Sports News",
      "url": "https://syriasportsnews.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://syriasportsnews.com/images/logo.png",
        "width": 512,
        "height": 512
      }
    },
    {
      "@type": "WebSite",
      "@id": "https://syriasportsnews.com/#website",
      "url": "https://syriasportsnews.com/",
      "name": "Oman Sports News",
      "inLanguage": "en",
      "publisher": {
        "@id": "https://syriasportsnews.com/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://syriasportsnews.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "CollectionPage",
      "@id": "https://syriasportsnews.com/#homepage",
      "url": "https://syriasportsnews.com/",
      "name": "Oman Sports News - Latest Sports News",
      "isPartOf": {
        "@id": "https://syriasportsnews.com/#website"
      },
      "about": {
        "@id": "https://syriasportsnews.com/#organization"
      }
    }
  ]
}
</script>
</head>
<body data-theme="light">
 <include src="header.html"></include> 
 <main class="main-width"> 
  <include src="sidebar.html"></include> 
  <div class="content">
    <include src="top-slider.html"></include>
    <div class="container">
      <a id="matches"></a>
     <include src="sports.html"></include> 
     <include src="app-banner.html"></include> 
     </div> 
      <div class="container">
        <a id="news"></a>
        <include src="news.html"></include> 
      </div>
      <include src="telegram-banner.html"></include> 
       <div class="container">
        <include src="teams.html"></include> 
      </div>
  </div>
 </main>
 <include src="app-popup.html"></include> 
<include src="footer.html"></include> 
<include src="bottom-panel.html"></include> 
<include src="redirect-popup.html"></include>

 <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

<script src="js/main.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>

</body>
</html>
